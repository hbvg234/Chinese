<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>汉语 · Học Tiếng Trung HSK 1-6</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F3EEE1;
    --paper-2:#EAE2CE;
    --paper-card:#FBF8F0;
    --ink:#2A2420;
    --ink-soft:#786F62;
    --seal:#B23A2E;
    --seal-dark:#8B2A20;
    --seal-tint:#B23A2E1a;
    --jade:#3E6E5C;
    --jade-tint:#3E6E5C1a;
    --gold:#B9903E;
    --line:#D9CFB6;
    --shadow: 0 6px 20px rgba(42,36,32,0.10);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 15% 8%, #EFE6C8 0%, transparent 45%),
      radial-gradient(circle at 90% 90%, #E6DCC0 0%, transparent 40%),
      var(--paper);
    color:var(--ink);
    font-family:'Be Vietnam Pro', sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
  }
  #shell{
    width:100%;
    max-width:480px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    position:relative;
    padding-bottom:78px;
  }
  /* Header */
  header{
    padding:22px 20px 14px;
    position:relative;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:12px;
  }
  .brand-seal{
    width:46px;height:46px;flex:none;
    border-radius:8px;
    background:var(--seal);
    color:#F3EEE1;
    display:flex;align-items:center;justify-content:center;
    font-family:'Noto Serif SC',serif;
    font-weight:700;font-size:22px;
    box-shadow: 0 3px 0 var(--seal-dark), var(--shadow);
    transform:rotate(-2deg);
  }
  .brand-text h1{
    margin:0;
    font-family:'Noto Serif SC',serif;
    font-size:21px;
    font-weight:700;
    letter-spacing:0.5px;
  }
  .brand-text p{
    margin:2px 0 0;
    font-size:12.5px;
    color:var(--ink-soft);
  }
  .stroke-accent{
    font-family:'Ma Shan Zheng',cursive;
    color:var(--seal);
    font-size:15px;
    margin-left:2px;
  }

  /* HSK level rail */
  .level-rail{
    display:flex;
    gap:10px;
    padding:4px 20px 16px;
    overflow-x:auto;
    scrollbar-width:none;
  }
  .level-rail::-webkit-scrollbar{display:none;}
  .level-pill{
    flex:none;
    width:56px;height:56px;
    border-radius:50%;
    border:2px solid var(--line);
    background:var(--paper-card);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-family:'Noto Serif SC',serif;
    cursor:pointer;
    transition:all .18s ease;
    position:relative;
  }
  .level-pill .lv-num{font-size:17px;font-weight:700;line-height:1;}
  .level-pill .lv-label{font-size:8.5px;letter-spacing:0.5px;color:var(--ink-soft);margin-top:2px;font-family:'Be Vietnam Pro',sans-serif;}
  .level-pill.active{
    border-color:var(--seal);
    background:var(--seal);
    color:#fff;
    transform:translateY(-3px);
    box-shadow:0 4px 0 var(--seal-dark);
  }
  .level-pill.active .lv-label{color:#F3DFDA;}
  .level-pill .ring{
    position:absolute;inset:-2px;
    border-radius:50%;
    border:2px solid transparent;
  }
  .level-pill.mastered-all::after{
    content:"✓";
    position:absolute;top:-4px;right:-4px;
    width:18px;height:18px;border-radius:50%;
    background:var(--jade);color:#fff;
    font-size:11px;display:flex;align-items:center;justify-content:center;
    border:2px solid var(--paper);
  }

  /* main */
  main{
    flex:1;
    padding:6px 20px 20px;
    display:flex;
    flex-direction:column;
  }

  .section-title{
    font-family:'Noto Serif SC',serif;
    font-weight:700;
    font-size:16px;
    margin:6px 0 12px;
    display:flex;
    align-items:baseline;
    gap:8px;
  }
  .section-title .zh{font-size:19px;color:var(--seal);}
  .progress-line{
    font-size:12px;color:var(--ink-soft);
    margin-left:auto;
    font-weight:500;
  }

  /* Flashcard view */
  .card-stage{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:340px;
    position:relative;
  }
  .flashcard{
    width:100%;
    max-width:340px;
    height:290px;
    perspective:1400px;
    cursor:pointer;
  }
  .flashcard-inner{
    position:relative;
    width:100%;height:100%;
    transition:transform .5s cubic-bezier(.2,.7,.3,1);
    transform-style:preserve-3d;
  }
  .flashcard.flipped .flashcard-inner{transform:rotateY(180deg);}
  .face{
    position:absolute;inset:0;
    -webkit-backface-visibility:hidden;
    backface-visibility:hidden;
    border-radius:20px;
    background:var(--paper-card);
    border:1px solid var(--line);
    box-shadow:var(--shadow);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:24px;
    text-align:center;
  }
  .face.back{transform:rotateY(180deg);}
  .face::before{
    content:"";
    position:absolute; inset:10px;
    border:1px solid var(--line);
    border-radius:13px;
    pointer-events:none;
    opacity:.6;
  }
  .hanzi-big{
    font-family:'Noto Serif SC',serif;
    font-weight:700;
    font-size:64px;
    line-height:1;
  }
  .hint-tap{
    margin-top:14px;
    font-size:11.5px;
    color:var(--ink-soft);
    letter-spacing:.3px;
  }
  .pinyin-big{
    font-size:22px;
    color:var(--seal);
    font-weight:600;
    margin-bottom:10px;
  }
  .meaning-big{
    font-size:19px;
    font-weight:600;
  }
  .hanzi-mini{
    font-family:'Noto Serif SC',serif;
    font-size:26px;
    color:var(--ink-soft);
    margin-top:14px;
  }
  .stamp{
    position:absolute;
    top:14px;right:14px;
    width:56px;height:56px;
    border:3px solid var(--jade);
    color:var(--jade);
    border-radius:8px;
    display:flex;align-items:center;justify-content:center;
    font-family:'Noto Serif SC',serif;
    font-weight:900;font-size:13px;
    transform:rotate(-14deg) scale(0);
    opacity:0;
    transition:transform .35s cubic-bezier(.3,1.6,.5,1), opacity .25s;
  }
  .stamp.show{transform:rotate(-14deg) scale(1);opacity:.85;}

  .card-controls{
    display:flex;
    gap:12px;
    width:100%;
    max-width:340px;
    margin-top:22px;
  }
  .btn{
    flex:1;
    border:none;
    border-radius:14px;
    padding:14px 8px;
    font-family:'Be Vietnam Pro',sans-serif;
    font-weight:600;
    font-size:14.5px;
    cursor:pointer;
    transition:transform .12s ease, filter .12s ease;
  }
  .btn:active{transform:scale(.96);}
  .btn-ghost{
    background:transparent;
    border:1.5px solid var(--ink-soft);
    color:var(--ink-soft);
  }
  .btn-seal{background:var(--seal);color:#fff;box-shadow:0 3px 0 var(--seal-dark);}
  .btn-jade{background:var(--jade);color:#fff;box-shadow:0 3px 0 #294B3F;}
  .btn-jade.done{filter:grayscale(.3) brightness(.9);}

  .dots{
    display:flex;gap:5px;justify-content:center;margin-top:18px;flex-wrap:wrap;max-width:300px;
  }
  .dot{width:7px;height:7px;border-radius:50%;background:var(--line);}
  .dot.cur{background:var(--seal);width:18px;border-radius:4px;}
  .dot.ok{background:var(--jade);}

  /* Quiz view */
  .quiz-card{
    background:var(--paper-card);
    border:1px solid var(--line);
    border-radius:18px;
    box-shadow:var(--shadow);
    padding:26px 20px;
    text-align:center;
    margin-bottom:16px;
  }
  .quiz-score{
    font-size:12.5px;color:var(--ink-soft);margin-bottom:6px;
  }
  .quiz-hanzi{
    font-family:'Noto Serif SC',serif;
    font-size:52px;font-weight:700;
  }
  .quiz-sub{font-size:12px;color:var(--ink-soft);margin-top:6px;}
  .options{display:flex;flex-direction:column;gap:10px;}
  .option{
    text-align:left;
    padding:14px 16px;
    border-radius:13px;
    border:1.5px solid var(--line);
    background:var(--paper-card);
    font-size:15px;font-weight:500;
    cursor:pointer;
    transition:all .15s ease;
  }
  .option:active{transform:scale(.98);}
  .option.correct{background:var(--jade-tint);border-color:var(--jade);color:var(--jade);font-weight:700;}
  .option.wrong{background:var(--seal-tint);border-color:var(--seal);color:var(--seal);font-weight:700;}
  .option[disabled]{cursor:default;}
  .quiz-next{margin-top:14px;}
  .quiz-empty{text-align:center;padding:40px 10px;color:var(--ink-soft);}
  .quiz-empty .zh-big{font-family:'Noto Serif SC',serif;font-size:40px;color:var(--seal);display:block;margin-bottom:10px;}

  /* List view */
  .search-box{
    display:flex;align-items:center;gap:8px;
    background:var(--paper-card);
    border:1.5px solid var(--line);
    border-radius:13px;
    padding:10px 14px;
    margin-bottom:14px;
  }
  .search-box input{
    border:none;outline:none;background:transparent;
    font-family:'Be Vietnam Pro',sans-serif;
    font-size:14.5px;flex:1;color:var(--ink);
  }
  .word-row{
    display:flex;align-items:center;gap:12px;
    padding:12px 4px;
    border-bottom:1px solid var(--line);
  }
  .word-row .wh{
    font-family:'Noto Serif SC',serif;font-size:23px;font-weight:700;
    width:52px;flex:none;
  }
  .word-row .wm{flex:1;min-width:0;}
  .word-row .wp{font-size:13px;color:var(--seal);font-weight:600;}
  .word-row .wv{font-size:13.5px;color:var(--ink-soft);margin-top:1px;}
  .word-row .wc{
    flex:none;width:22px;height:22px;border-radius:50%;
    border:1.5px solid var(--line);
  }
  .word-row .wc.on{background:var(--jade);border-color:var(--jade);position:relative;}
  .word-row .wc.on::after{content:"✓";color:#fff;font-size:12px;position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}

  /* Progress view */
  .stat-grid{display:flex;gap:10px;margin-bottom:20px;}
  .stat-box{
    flex:1;background:var(--paper-card);border:1px solid var(--line);
    border-radius:14px;padding:14px 10px;text-align:center;
  }
  .stat-box .num{font-family:'Noto Serif SC',serif;font-size:24px;font-weight:700;color:var(--seal);}
  .stat-box .lab{font-size:11px;color:var(--ink-soft);margin-top:2px;}
  .bar-row{margin-bottom:14px;}
  .bar-row .bar-top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;font-weight:600;}
  .bar-track{height:10px;background:var(--paper-2);border-radius:6px;overflow:hidden;}
  .bar-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--seal));border-radius:6px;transition:width .5s ease;}

  /* bottom nav */
  nav.tabbar{
    position:fixed;
    bottom:0;left:50%;transform:translateX(-50%);
    width:100%;max-width:480px;
    background:var(--paper-card);
    border-top:1px solid var(--line);
    display:flex;
    padding:8px 6px calc(8px + env(safe-area-inset-bottom));
    box-shadow:0 -6px 18px rgba(42,36,32,0.08);
    z-index:20;
  }
  .tab-btn{
    flex:1;
    display:flex;flex-direction:column;align-items:center;gap:3px;
    background:none;border:none;
    padding:6px 0;
    color:var(--ink-soft);
    font-family:'Be Vietnam Pro',sans-serif;
    font-size:10.5px;font-weight:600;
    cursor:pointer;
  }
  .tab-btn svg{width:21px;height:21px;}
  .tab-btn.active{color:var(--seal);}
  .tab-btn.active svg{stroke:var(--seal);}

  .empty-note{
    text-align:center;color:var(--ink-soft);font-size:13px;padding:30px 10px;
  }
  ::selection{background:var(--seal-tint);}
</style>
</head>

  <header>
    <div class="brand">
      <div class="brand-seal">汉</div>
      <div class="brand-text">
        <h1>Học Tiếng Trung<span class="stroke-accent">墨</span></h1>
        <p>Từ vựng HSK 1 – 6 · luyện mỗi ngày một chút</p>
      </div>
    </div>
  </header>

  <div class="level-rail" id="levelRail"></div>

  <main id="mainView"></main>

  <nav class="tabbar">
    <button class="tab-btn" data-tab="flash">

      Thẻ ghi nhớ
    </button>
    <button class="tab-btn" data-tab="quiz">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 1 1 3.2 2.4c-.9.3-1.2.9-1.2 1.8"/><circle cx="12" cy="17" r=".6" fill="currentColor"/></svg>
      Kiểm tra
    </button>
    <button class="tab-btn" data-tab="list">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
      Từ vựng
    </button>
    <button class="tab-btn" data-tab="progress">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V9M12 19V4M20 19v-6"/></svg>
      Tiến độ
    </button>
  </nav>
</div>

/* ================= STATE ================= */
let state = {
  level: "hsk1",

  flipped: false,

/* ---- persistence via artifact storage, falls back to memory ---- */
async function loadProgress(){
  try{
    const res = await window.storage.get("hsk-mastered", false);
    if(res && res.value) state.mastered = JSON.parse(res.value);
  }catch(e){ /* no stored data yet or storage unavailable */ }
}
async function saveProgress(){
  try{ await window.storage.set("hsk-mastered", JSON.stringify(state.mastered), false); }
  catch(e){ /* storage unavailable, progress stays in-memory only */ }
}

/* ================= HELPERS ================= */
function levelLabel(k){ return k.replace("hsk","HSK "); }
function levelWords(k){ return VOCAB[k]; }
function levelMasteredCount(k){
  return levelWords(k).reduce((n,_,i)=> n + (state.mastered[wordId(k,i)] ? 1:0), 0);
}
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

/* ================= RENDER: LEVEL RAIL ================= */
function renderLevelRail(){
  const rail = document.getElementById("levelRail");
  rail.innerHTML = "";
  LEVEL_KEYS.forEach(k=>{
    const total = levelWords(k).length;
    const done = levelMasteredCount(k);
    const btn = document.createElement("div");
    btn.className = "level-pill" + (k===state.level ? " active":"") + (done===total ? " mastered-all":"");
    btn.innerHTML = `<div class="lv-num">${k.replace("hsk","")}</div><div class="lv-label">HSK</div>`;
    btn.onclick = ()=>{
      state.level = k; state.cardIndex = 0; state.flipped = false;
      state.quiz = { pool:[], idx:0, score:0, total:0, answered:false, choice:null, correctIdx:null };
      renderAll();
    };
    rail.appendChild(btn);
  });
}

    <div class="section-title">
      <span class="zh">卡片</span> Thẻ ghi nhớ ${levelLabel(state.level)}
      <span class="progress-line">${i+1}/${words.length}</span>
    </div>
    <div class="card-stage">
      <div class="flashcard ${state.flipped?'flipped':''}" id="flashcard">
        <div class="flashcard-inner">
          <div class="face front">
            <div class="hanzi-big">${w[0]}</div>
            <div class="hint-tap">chạm vào thẻ để xem nghĩa</div>
            <div class="stamp ${isMastered?'show':''}">已<br>掌握</div>
          </div>
          <div class="face back">
            <div class="pinyin-big">${w[1]}</div>
            <div class="meaning-big">${w[2]}</div>
            <div class="hanzi-mini">${w[0]}</div>
          </div>
        </div>
      </div>
      <div class="card-controls">
        <button class="btn btn-ghost" id="prevBtn">‹ Trước</button>
        <button class="btn ${isMastered?'btn-jade done':'btn-jade'}" id="masterBtn">${isMastered? '✓ Đã thuộc':'Đã thuộc'}</button>
        <button class="btn btn-ghost" id="nextBtn">Sau ›</button>
      </div>
      <div class="dots">${words.map((_,idx)=>{
        const wid = wordId(state.level, idx);
        const cls = idx===i ? "cur" : (state.mastered[wid] ? "ok":"");
        return `<span class="dot ${cls}"></span>`;
      }).join("")}</div>
    </div>
  `;
  const main = document.getElementById("mainView");
  main.innerHTML = "";
  main.appendChild(wrap);

  document.getElementById("flashcard").onclick = ()=>{
    state.flipped = !state.flipped;
    renderFlash();
  };
  document.getElementById("prevBtn").onclick = (e)=>{
    e.stopPropagation();
    state.cardIndex = (i - 1 + words.length) % words.length;
    state.flipped = false;
    renderFlash();
  };
  document.getElementById("nextBtn").onclick = (e)=>{
    e.stopPropagation();
    state.cardIndex = (i + 1) % words.length;
    state.flipped = false;
    renderFlash();
  };
  document.getElementById("masterBtn").onclick = (e)=>{
    e.stopPropagation();
    if(isMastered){ delete state.mastered[id]; } else { state.mastered[id] = true; }
    saveProgress();
    renderFlash();
    renderLevelRail();
  };
}

/* ================= RENDER: QUIZ VIEW ================= */
function newQuizQuestion(){
  const words = levelWords(state.level);
  if(words.length < 4){ state.quiz.pool = []; return; }
  if(state.quiz.pool.length === 0){
    state.quiz.pool = shuffle(words.map((_,i)=>i));
  }
  const correctIdx = state.quiz.pool.shift();
  const wrongPool = shuffle(words.map((_,i)=>i).filter(x=>x!==correctIdx)).slice(0,3);
  const options = shuffle([correctIdx, ...wrongPool]);
  state.quiz.current = { correctIdx, options };
  state.quiz.answered = false;
  state.quiz.choice = null;
}

function renderQuiz(){
  const words = levelWords(state.level);
  const main = document.getElementById("mainView");
  main.innerHTML = "";

  if(words.length < 4){
    main.innerHTML = `
      <div class="section-title"><span class="zh">测验</span> Kiểm tra</div>
      <div class="quiz-empty"><span class="zh-big">不够</span>Cấp độ này cần thêm từ để tạo câu hỏi trắc nghiệm.</div>`;
    return;
  }

  if(!state.quiz.current){ newQuizQuestion(); }
  const { correctIdx, options } = state.quiz.current;
  const qWord = words[correctIdx];

  const wrap = document.createElement("div");
  wrap.innerHTML = `
    <div class="section-title"><span class="zh">测验</span> Kiểm tra ${levelLabel(state.level)}</div>
    <div class="quiz-card">
      <div class="quiz-score">Điểm: ${state.quiz.score}/${state.quiz.total}</div>
      <div class="quiz-hanzi">${qWord[0]}</div>
      <div class="quiz-sub">${qWord[1]} · chọn nghĩa đúng</div>
    </div>
    <div class="options" id="optionsBox"></div>
    <div class="quiz-next" id="nextWrap"></div>
  `;
  main.appendChild(wrap);

  const optionsBox = wrap.querySelector("#optionsBox");
  options.forEach(optIdx=>{
    const btn = document.createElement("button");
    btn.className = "option";
    btn.textContent = words[optIdx][2];
    btn.onclick = ()=>{
      if(state.quiz.answered) return;
      state.quiz.answered = true;
      state.quiz.total += 1;
      if(optIdx === correctIdx) state.quiz.score += 1;
      state.quiz.choice = optIdx;
      renderQuiz();
    };
    if(state.quiz.answered){
      btn.disabled = true;
      if(optIdx === correctIdx) btn.classList.add("correct");
      else if(optIdx === state.quiz.choice) btn.classList.add("wrong");
    }
    optionsBox.appendChild(btn);
  });

  const nextWrap = wrap.querySelector("#nextWrap");
  if(state.quiz.answered){
    const nb = document.createElement("button");
    nb.className = "btn btn-seal";
    nb.style.width = "100%";
    nb.textContent = "Câu tiếp theo ›";
    nb.onclick = ()=>{ state.quiz.current = null; newQuizQuestion(); renderQuiz(); };
    nextWrap.appendChild(nb);
  }
}

/* ================= RENDER: LIST VIEW ================= */
function renderList(){
  const words = levelWords(state.level);
  const main = document.getElementById("mainView");
  main.innerHTML = "";

  const wrap = document.createElement("div");
  wrap.innerHTML = `
    <div class="section-title"><span class="zh">词汇</span> Từ vựng ${levelLabel(state.level)}
      <span class="progress-line">${levelMasteredCount(state.level)}/${words.length}</span>
    </div>
    <div class="search-box">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#786F62" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
      <input id="searchInput" placeholder="Tìm theo chữ Hán, pinyin hoặc nghĩa..." value="${state.search}">
    </div>
    <div id="wordListBox"></div>
  `;
  main.appendChild(wrap);

  function draw(){
    const q = state.search.trim().toLowerCase();
    const box = wrap.querySelector("#wordListBox");
    box.innerHTML = "";
    const filtered = words.map((w,i)=>({w,i})).filter(({w})=>{
      if(!q) return true;
      return w[0].includes(q) || w[1].toLowerCase().includes(q) || w[2].toLowerCase().includes(q);
    });
    if(filtered.length===0){
      box.innerHTML = `<div class="empty-note">Không tìm thấy từ nào phù hợp.</div>`;
      return;
    }
    filtered.forEach(({w,i})=>{
      const id = wordId(state.level,i);
      const row = document.createElement("div");
      row.className = "word-row";
      row.innerHTML = `
        <div class="wh">${w[0]}</div>
        <div class="wm"><div class="wp">${w[1]}</div><div class="wv">${w[2]}</div></div>
        <div class="wc ${state.mastered[id]?'on':''}"></div>
      `;
      row.querySelector(".wc").onclick = ()=>{
        if(state.mastered[id]) delete state.mastered[id]; else state.mastered[id]=true;
        saveProgress();
        draw();
        renderLevelRail();
      };
      box.appendChild(row);
    });
  }
  draw();
  wrap.querySelector("#searchInput").oninput = (e)=>{ state.search = e.target.value; draw(); };
}

/* ================= RENDER: PROGRESS VIEW ================= */
function renderProgress(){
  const main = document.getElementById("mainView");
  main.innerHTML = "";

  const totalWords = LEVEL_KEYS.reduce((n,k)=> n + levelWords(k).length, 0);
  const totalMastered = LEVEL_KEYS.reduce((n,k)=> n + levelMasteredCount(k), 0);
  const levelsDone = LEVEL_KEYS.filter(k=> levelMasteredCount(k)===levelWords(k).length).length;

  const wrap = document.createElement("div");
  wrap.innerHTML = `
    <div class="section-title"><span class="zh">进度</span> Tiến độ học tập</div>
    <div class="stat-grid">
      <div class="stat-box"><div class="num">${totalMastered}</div><div class="lab">Từ đã thuộc</div></div>
      <div class="stat-box"><div class="num">${totalWords}</div><div class="lab">Tổng số từ</div></div>
      <div class="stat-box"><div class="num">${levelsDone}</div><div class="lab">Cấp hoàn thành</div></div>
    </div>
    <div id="barsBox"></div>
  `;
  main.appendChild(wrap);

  const barsBox = wrap.querySelector("#barsBox");
  LEVEL_KEYS.forEach(k=>{
    const total = levelWords(k).length;
    const done = levelMasteredCount(k);
    const pct = total ? Math.round(done/total*100) : 0;
    const row = document.createElement("div");
    row.className = "bar-row";
    row.innerHTML = `
      <div class="bar-top"><span>${levelLabel(k)}</span><span>${done}/${total}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
    `;
    barsBox.appendChild(row);
  });
}

/* ================= TAB SWITCH ================= */
function renderTabbar(){
  document.querySelectorAll(".tab-btn").forEach(btn=>{
    btn.classList.toggle("active", btn.dataset.tab === state.tab);
    btn.onclick = ()=>{
      state.tab = btn.dataset.tab;
      if(state.tab === "quiz"){ state.quiz.current = null; }
      renderAll();
    };
  });
}

function renderMain(){
  if(state.tab === "flash") renderFlash();
  else if(state.tab === "quiz") renderQuiz();
  else if(state.tab === "list") renderList();
  else if(state.tab === "progress") renderProgress();
}

function renderAll(){
  renderLevelRail();
  renderTabbar();
  renderMain();
}

/* ================= INIT ================= */
(async function init(){
  await loadProgress();
  renderAll();
})();
</script>
</body>
